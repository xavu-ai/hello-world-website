<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hello World - A beautifully crafted welcome page">
    <meta name="theme-color" content="#667eea">
    <title>Hello World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="container">
        <div class="card">
            <div class="card__badge">Welcome</div>
            <h1 id="greeting" class="greeting" tabindex="0" role="button" aria-label="Click to change greeting color">Hello World</h1>
            <p class="message">Welcome to the Hello World website.</p>
            <p class="timestamp" id="timestamp" aria-live="polite"></p>
            <div class="card__footer">
                <button class="btn" id="refresh-btn" type="button" aria-label="Refresh timestamp">
                    <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M1 20v-6h6"></path>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
